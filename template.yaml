AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Port.io Integration


Parameters:
  Domain:
    Type: String
    Description: 'Name of Domain'

  System:
    Type: String
    Description: "Name of System"

  Component:
    Type: String
    Description: "Name of Component"

  CodeBranch:
    Type: String
    Description: "Name of GitHub Branch"

  PortIoTemplateLocation:
    Type: String
    Description: "S3 URL of the Port.io CloudFormation template to deploy"

  TargetOUIds:
    Type: CommaDelimitedList
    Description: 'Comma separated list of OUs'

  OrgId:
    Type: String
    Description: 'AWS Organization ID'

  IntegrationIdentifier:
    Type: String
    Description: 'Unique identifier for the integration, e.g. portio-integration'

  OIDCSubject:
    Type: String
    Description: 'The OIDC subject claim to be used in the IAM Role trust policy'
    NoEcho: 'true'

Resources:
  PortIoIntegrationStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: !Ref PortIoTemplateLocation
      Parameters:
        TargetOUIds: !Ref TargetOUIds
        OrgId: !Ref OrgId
        IntegrationIdentifier: !Ref IntegrationIdentifier
        OIDCSubject: !Ref OIDCSubject
